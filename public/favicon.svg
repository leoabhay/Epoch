<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#b8ff6c"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="48" height="48" rx="14" fill="#050814" opacity="0.9"/>
  <!-- simple monogram using ASCII letters to avoid encoding issues -->
  <text x="22" y="39" text-anchor="middle" font-size="18" fill="#fdfdfd"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    T
  </text>
  <text x="40" y="39" text-anchor="middle" font-size="18" fill="#fdfdfd"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    S
  </text>
</svg>


